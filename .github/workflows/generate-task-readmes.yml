name: Generate Task READMEs

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-task-readmes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate task READMEs and update root README
        shell: bash
        run: |
          set -euo pipefail

          detect_solution_file() {
            local task_dir="$1"
            local solution_file=""

            if [ -f "$task_dir/Main.java" ]; then
              solution_file="Main.java"
            elif compgen -G "$task_dir/*.cpp" > /dev/null; then
              solution_file="$(basename "$(ls "$task_dir"/*.cpp | head -n 1)")"
            elif compgen -G "$task_dir/*.py" > /dev/null; then
              solution_file="$(basename "$(ls "$task_dir"/*.py | head -n 1)")"
            elif compgen -G "$task_dir/*.kt" > /dev/null; then
              solution_file="$(basename "$(ls "$task_dir"/*.kt | head -n 1)")"
            fi

            echo "$solution_file"
          }

          detect_problem_url() {
            local task_dir="$1"
            python3 - "$task_dir" <<'PY'
          import re
          import sys
          from pathlib import Path

          task_dir = Path(sys.argv[1])
          url_pattern = re.compile(r"https?://[^\s)]+")
          markdown_link_pattern = re.compile(r"\[[^\]]+\]\((https?://[^)\s]+)\)")

          def first_external_url(text: str) -> str:
              markdown_match = markdown_link_pattern.search(text)
              if markdown_match:
                  return markdown_match.group(1)
              plain_match = url_pattern.search(text)
              if plain_match:
                  return plain_match.group(0)
              return ""

          for candidate in (task_dir / "problem.url", task_dir / "problem.txt"):
              if candidate.is_file():
                  found = first_external_url(candidate.read_text(encoding="utf-8"))
                  if found:
                      print(found)
                      raise SystemExit(0)

          readme = task_dir / "README.md"
          if readme.is_file():
              readme_content = readme.read_text(encoding="utf-8")
              lines = readme_content.splitlines()
              for line in lines:
                  if "- **Question:**" in line:
                      found = first_external_url(line)
                      if found:
                          print(found)
                          raise SystemExit(0)
              found = first_external_url(readme_content)
              if found:
                  print(found)
                  raise SystemExit(0)

          # Empty stdout means no direct external problem URL was detected.
          print("")
          PY
          }

          while IFS= read -r -d '' platform_dir; do
            platform_name="$(basename "$platform_dir")"

            while IFS= read -r -d '' contest_dir; do
              contest_name="$(basename "$contest_dir")"

              while IFS= read -r -d '' task_dir; do
                task_name="$(basename "$task_dir")"
                task_readme="$task_dir/README.md"
                solution_file="$(detect_solution_file "$task_dir")"
                problem_url="$(detect_problem_url "$task_dir")"

                {
                  printf '# %s\n\n' "${task_name}"
                  printf '## Reference\n\n'
                  printf -- '- **Platform:** %s\n' "${platform_name}"
                  printf -- '- **Contest:** %s\n' "${contest_name}"
                  printf -- '- **Task:** %s\n' "${task_name}"
                  if [ -n "$problem_url" ]; then
                    printf -- '- **Question:** [View Problem](%s)\n\n' "${problem_url}"
                  else
                    printf -- '- **Question:** See README.md for details\n\n'
                  fi
                  printf '## Solution File\n\n'
                  printf -- '- [%s](./%s)\n' "${solution_file:-Add solution file}" "${solution_file:-}"
                } > "$task_readme"

                echo "Generated: $task_readme"
              done < <(find "$contest_dir" -mindepth 1 -maxdepth 1 -type d -print0 | sort -z)
            done < <(find "$platform_dir" -mindepth 1 -maxdepth 1 -type d -print0 | sort -z)
          done < <(find . -mindepth 1 -maxdepth 1 -type d ! -name '.git' ! -name '.github' -print0 | sort -z)

          generated_file="$(mktemp)"

          {
            echo "## ✅ Solved Problems"
            echo

            while IFS= read -r -d '' platform_dir; do
              platform_name="$(basename "$platform_dir")"
              echo "### ${platform_name}"
              echo

              while IFS= read -r -d '' contest_dir; do
                contest_name="$(basename "$contest_dir")"
                echo "<details open>"
                echo "<summary><strong>${contest_name}</strong></summary>"
                echo
                echo "| Task | Solution | Question |"
                echo "|------|----------|----------|"

                while IFS= read -r -d '' task_dir; do
                  task_name="$(basename "$task_dir")"
                  escaped_task_name="${task_name//|/\\|}"
                  relative_task_path="${task_dir#./}"
                  encoded_task_path="$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))' "${relative_task_path}")"
                  solution_file="$(detect_solution_file "$task_dir")"
                  problem_url="$(detect_problem_url "$task_dir")"

                  if [ -n "$solution_file" ]; then
                    encoded_solution_file="$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))' "${solution_file}")"
                    solution_cell="[${solution_file}](./${encoded_task_path}/${encoded_solution_file})"
                  else
                    solution_cell="-"
                  fi

                  if [ -n "$problem_url" ]; then
                    question_cell="[Link](${problem_url})"
                  else
                    question_cell="-"
                  fi

                  echo "| ${escaped_task_name} | ${solution_cell} | ${question_cell} |"
                done < <(find "$contest_dir" -mindepth 1 -maxdepth 1 -type d -print0 | sort -z)

                echo
                echo "</details>"
                echo
              done < <(find "$platform_dir" -mindepth 1 -maxdepth 1 -type d -print0 | sort -z)
            done < <(find . -mindepth 1 -maxdepth 1 -type d ! -name '.git' ! -name '.github' -print0 | sort -z)
          } > "$generated_file"

          export GENERATED_FILE="$generated_file"
          python3 - <<'PY'
          import os
          from pathlib import Path

          readme = Path("README.md")
          start_marker = "<!-- SOLVED_PROBLEMS:START -->"
          end_marker = "<!-- SOLVED_PROBLEMS:END -->"
          generated = Path(os.environ["GENERATED_FILE"]).read_text(encoding="utf-8").rstrip()
          content = readme.read_text(encoding="utf-8")

          start = content.find(start_marker)
          end = content.find(end_marker)
          if start == -1 or end == -1 or end < start:
            raise SystemExit("Missing or invalid solved-problems markers in README.md")

          new_content = (
              content[: start + len(start_marker)]
              + "\n"
              + generated
              + "\n"
              + content[end:]
          )
          readme.write_text(new_content, encoding="utf-8")
          PY

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          branch: automation/generate-task-readmes
          delete-branch: true
          commit-message: "docs: generate task README references"
          title: "docs: generate task README references"
          body: |
            ## Summary
            - Generated/updated README.md files for each task directory.
            - Traversed repository in platform/contest/task structure.

            ## Notes
            - This PR was created automatically by the workflow.
          labels: |
            documentation
            automated pr
